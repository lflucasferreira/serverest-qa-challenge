name: E2E Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Roda a cada hora, cheia (UTC), como monitoramento contínuo: como o ServeRest é uma
    # aplicação de terceiros, isso detecta mudanças de comportamento na app mesmo sem
    # nenhum push nosso - não só regressões no nosso próprio código.
    - cron: '0 * * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  test:
    name: Cypress Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Cache Cypress binary
        uses: actions/cache@v6
        with:
          path: ~/.cache/Cypress
          key: cypress-binary-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - name: Run Cypress (API + UI + segurança)
        # Grava no Cypress Cloud apenas em push/PR (não no cron horário, para não estourar a
        # cota gratuita) e só quando o secret CYPRESS_RECORD_KEY já estiver configurado - sem
        # ele, roda normalmente sem --record em vez de quebrar o job.
        run: |
          if [ "${{ github.event_name }}" != "schedule" ] && [ -n "$CYPRESS_RECORD_KEY" ]; then
            npx cypress run --record
          else
            npx cypress run
          fi
        env:
          CYPRESS_BASE_URL: https://front.serverest.dev
          CYPRESS_API_URL: https://serverest.dev
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload Mochawesome report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mochawesome-report
          path: mochawesome-report
          retention-days: 14

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 14

      - name: Upload Cypress screenshots (failures)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 14

  publish-report:
    name: Publish report to GitHub Pages
    needs: test
    if: always() && github.ref == 'refs/heads/main' && contains(fromJSON('["push", "schedule"]'), github.event_name)
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Mochawesome report
        uses: actions/download-artifact@v8
        with:
          name: mochawesome-report
          path: mochawesome-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: mochawesome-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
